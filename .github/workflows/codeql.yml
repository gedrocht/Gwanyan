name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-analyzable-languages:
    name: Detect analyzable languages
    runs-on: ubuntu-latest
    outputs:
      has_actions: ${{ steps.detect.outputs.has_actions }}
      has_javascript_typescript: ${{ steps.detect.outputs.has_javascript_typescript }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect committed analyzable languages
        id: detect
        shell: bash
        run: |
          shopt -s globstar nullglob

          if compgen -G ".github/workflows/*.yml" > /dev/null || compgen -G ".github/workflows/*.yaml" > /dev/null || compgen -G ".github/actions/**/action.yml" > /dev/null || compgen -G ".github/actions/**/action.yaml" > /dev/null; then
            echo "has_actions=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_actions=false" >> "${GITHUB_OUTPUT}"
          fi

          if git ls-files -- '*.js' '*.cjs' '*.mjs' '*.jsx' '*.ts' '*.cts' '*.mts' '*.tsx' | grep -q .; then
            echo "has_javascript_typescript=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_javascript_typescript=false" >> "${GITHUB_OUTPUT}"
          fi

  analyze-actions:
    name: Analyze (GitHub Actions)
    needs: detect-analyzable-languages
    # Only run the Actions extractor when the repository actually contains
    # workflow or composite-action files to scan.
    if: ${{ needs.detect-analyzable-languages.outputs.has_actions == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-javascript-typescript:
    name: Analyze (JavaScript/TypeScript)
    needs: detect-analyzable-languages
    # CodeQL fails with exit code 32 when a language is declared in the
    # workflow but there are no committed files of that language to analyze.
    # This guard lets the workflow pass on the governance-only bootstrap, and
    # it automatically enables JavaScript/TypeScript analysis once source files
    # are committed to the repository.
    if: ${{ needs.detect-analyzable-languages.outputs.has_javascript_typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
