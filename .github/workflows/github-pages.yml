name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages Site
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build documentation site
        env:
          DOCUSAURUS_SITE_URL: https://${{ github.repository_owner }}.github.io
          DOCUSAURUS_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run docs:build

      - name: Resolve generated documentation site path
        id: generated-site
        run: echo "path=$(cat documentation/site/generated-builds/latest-path.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.generated-site.outputs.path }}

  deploy:
    name: Deploy Pages Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
